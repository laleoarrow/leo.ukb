# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install CJK fonts for vignette rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools, any::remotes, any::regmedint, local::.
          needs: website
          dependencies: '"hard"'

      - name: Pin pkgdown version
        run: |
          remotes::install_version(
            package = "pkgdown",
            version = "2.1.3",
            repos = "https://cloud.r-project.org",
            upgrade = "never",
            dependencies = FALSE,
            quiet = TRUE
          )
          cat(as.character(packageVersion("pkgdown")), "\n")
        shell: Rscript {0}

      - name: Build site
        run: source("scripts/build_pkgdown_site.R")
        shell: Rscript {0}

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site

  deploy:
    if: github.event_name != 'pull_request'
    needs: pkgdown
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
